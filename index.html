<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/icons8-quiz-64.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>adaquiz</title>
  </head>
  <body>
    <div id="app">
      <div class="welcome">
        <h1>Title</h1>
        <button class="button" id="startButton">Démarrer</button>
      </div>
      <div class="questions" id="questions-container">
        <header>
          <h1>Title</h1>
        </header>

        <p id="lives">Vies : 3</p>

        <div class="progress-container"><div id="display-progress"></div></div>
        <div id="currentQuestion"></div>
        <div id="answerButtons">
          <button class="buttonA" id="button1" data-index="0">Réponse 1</button>
          <button class="buttonA" id="button2" data-index="1">Réponse 2</button>
          <button class="buttonA" id="button3" data-index="2">Réponse 3</button>
          <button class="buttonA" id="button4" data-index="3">Réponse 4</button>
        </div>
        <div id="answerMessage"></div>
        <button class="button" id="next-question">Question suivante</button>
      </div>
      <div class="endScreen">
        <h2 id="scoreMessage"></h2>
        <h3 id="resultScore"></h3>
        <div id="totalScore"></div>

        <p id="bestScore"></p>

        <button class="button" id="retryQuiz">Recommencer</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
