<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>adaquiz</title>
  </head>
  <body>
    <header class="questions">
      <h1>Title</h1>
    </header>
    <div id="app">
      <div class="welcome">
        <h1>Title</h1>
        <button class="button" id="startButton">Démarrer</button>
      </div>
      <div class="questions">
        <div id="currentQuestion"></div>
        <div id="answerButtons">
          <button class="button" id="button1">Réponse 1</button>
          <button class="button" id="button2">Réponse 2</button>
          <button class="button" id="button3">Réponse 3</button>
          <button class="button" id="button4">Réponse 4</button>
        </div>
        <div id="answerMessage"></div>
        <button id="nextQuestion"></button>
      </div>
      <div class="endScreen">
        <h2 id="scoreMessage"></h2>
        <h3 id="resultScore"></h3>
        <div id="totalScore"></div>
        <button id="retryQuiz">Recommencer</button>
      </div>
    </div>
    <div></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
